trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: "dotnetmssqlrm559982"
  acrLoginServer: "dotnetmssqlrm559982.azurecr.io"
  imageName: "ecoorbit-dotnet"
  containerName: "ecoorbit-dotnet-api"
  resourceGroup: "dotnetmssqlrm559982"
  location: "germanywestcentral"

stages:
  - stage: Build
    displayName: "Build e Push para ACR"
    jobs:
      - job: BuildAndPush
        steps:
          - task: Docker@2
            displayName: "Build e Push - ecoorbit-dotnet"
            inputs:
              containerRegistry: "dotnetmssqlrm559982"
              repository: "$(imageName)"
              command: "buildAndPush"
              Dockerfile: "src/ecoorbit-dotnet/Dockerfile"
              buildContext: "."
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: "Deploy para Azure Container Instances"
    dependsOn: Build
    jobs:
      - job: Deploy
        steps:
          - task: AzureCLI@2
            displayName: "Deploy ACI"
            inputs:
              azureSubscription: "dotnetmssqlrm559982"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                az container delete \
                  --resource-group $(resourceGroup) \
                  --name $(containerName) \
                  --yes 2>/dev/null || true

                az container create \
                  --resource-group $(resourceGroup) \
                  --name $(containerName) \
                  --image $(acrLoginServer)/$(imageName):$(Build.BuildId) \
                  --registry-login-server $(acrLoginServer) \
                  --registry-username $(acrUsername) \
                  --registry-password $(acrPassword) \
                  --dns-name-label $(containerName) \
                  --ports 8080 \
                  --os-type Linux \
                  --cpu 1 \
                  --memory 1.5 \
                  --environment-variables \
                    ASPNETCORE_ENVIRONMENT=Production \
                  --secure-environment-variables \
                    "ConnectionStrings__SqlServer=$(sqlServerConnectionString)" \
                    "Jwt__Key=$(jwtKey)"
